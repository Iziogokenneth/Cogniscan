services:
  - type: web
    name: cogniscan-backend
    runtime: python
    rootDir: cogniscan-backend
    buildCommand: "./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false        # You will set this manually in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # Set to your Vercel URL once deployed, e.g. https://cogniscan.vercel.app
    plan: free
